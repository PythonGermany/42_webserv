server {
  host localhost;
  port 8080;
  client_max_body_size 1048576;
  server_name localhost localhost:8080;
  
  location {
    url /;
    root /home/pythongermany/_Projects/42_webserv/website;
    method GET;
    index index.html;
    autoindex on;
    cgi .php /notexisting;
  }

  location {
    url /redirect;
    root /home/pythongermany/_Projects/42_webserv/website;
    index index.html;
    method GET POST DELETE;
    redirect /images/mushroom_set.png;
  }
}